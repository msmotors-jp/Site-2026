<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif}
a{text-decoration:none;color:white}

.hero{
  height:100vh;
  background:
    linear-gradient(to right,rgba(0,0,0,.75),rgba(0,0,0,.15)),
    url("46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png") center/cover no-repeat;
  position:relative;
}

.logo{7EA47DE1-F50E-4A8D-B88B-34E002C5BCDF.png
  position:absolute;
  top:25px;
  left:25px;
  width:170px;
}

.lang{
  position:absolute;
  top:25px;
  right:25px;
}
.lang button{
  background:#111;
  color:#fff;
  border:1px solid #fff;
  padding:8px 12px;
  margin-left:6px;
}

.hero-text{
  position:absolute;
  left:30px;
  bottom:120px;
}
.hero-text h1{
  font-size:52px;
  line-height:1;
  font-weight:900;
}
.hero-text span{color:red}
.hero-text p{
  font-size:22px;
  margin-top:15px;
}

.btn{
  display:inline-block;
  padding:14px 24px;
  margin-top:20px;
  border-radius:5px;
  font-weight:bold;
}
.red{background:#d90000}
.green{background:#00c300}

.features{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #222;
  border-bottom:1px solid #222;
}
.feature{
  text-align:center;
  padding:25px 8px;
  border-right:1px solid #222;
}
.feature h3{color:red;margin-bottom:8px}

.section{
  padding:35px 18px;
  text-align:center;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.gallery img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:6px;
}

iframe{
  width:100%;
  height:280px;
  border:0;
  border-radius:8px;
}

.footer{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:30px 18px;
  border-top:1px solid #222;
}
.box{text-align:center}
.qr{width:130px}

.float{
  position:fixed;
  right:18px;
  bottom:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:99;
}
.float a{
  padding:13px 20px;
  border-radius:40px;
  font-weight:bold;
}

.copy{
  text-align:center;
  padding:18px;
  color:#888;
  font-size:13px;
}

@media(max-width:700px){
  .hero-text h1{font-size:42px}
  .features{grid-template-columns:repeat(2,1fr)}
  .footer{grid-template-columns:1fr}
}
</style>
</head>

<body>

<section class="hero">
  <img src="logo.png.PNG" class="logo">

  <div class="lang">
    <button>EN</button>
    <button>JP</button>
  </div>

  <div class="hero-text">
    <h1>JDM <span>DRIFT</span><br>CARS</h1>
    <p>Japan Quality.</p>
    <a class="btn red" href="https://wa.me/819041616477">WhatsApp</a>
  </div>
</section>

<section class="features">
  <div class="feature"><h3>ターボ車専門店</h3><p>高品質なJDM車を厳選</p></div>
  <div class="feature"><h3>整備・カスタム</h3><p>自社工場完備で安心</p></div>
  <div class="feature"><h3>安心取引</h3><p>国内外のお客様に対応</p></div>
  <div class="feature"><h3>輸出サポート</h3><p>海外のお客様も相談可</p></div>
</section>

<section class="section">
  <h2>Gallery</h2><br>
  <div class="gallery">
    <img src="IMG_0487.jpeg">
    <img src="IMG_1248.jpeg">
    <img src="IMG_4007.jpeg">
    <img src="IMG_6080.jpeg">
    <img src="IMG_6863.jpeg">
    <img src="IMG_6963.jpeg">
    <img src="IMG_7650.jpeg">
    <img src="IMG_8500.jpeg">
    <img src="IMG_8521.jpeg">
    <img src="IMG_9382.jpeg">
  </div>
</section>

<section class="section">
  <h2>所在地</h2><br>
  <p>〒390-1101<br>長野県東筑摩郡朝日村西洗馬410-1</p><br>
  <iframe src="https://maps.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>
</section>

<section class="footer">
  <div class="box">
    <h3>CarSensor</h3><br>
    <a class="btn red" href="https://www.carsensor.net/shop/nagano/329830001/?BKKN=AU6729676253&fed=othshoplinkb20190809001ns" target="_blank">在庫を見る</a>
  </div>

  <div class="box">
    <h3>LINE QR</h3><br>
    <img src="line-qr.png.JPG" class="qr">
  </div>

  <div class="box">
    <h3>Instagram</h3><br>
    <a class="btn red" href="https://instagram.com/msmotors_oficial" target="_blank">@msmotors_oficial</a>
  </div>
</section>

<div class="float">
  <a class="green" href="#line">LINE</a>
  <a class="green" href="https://wa.me/819041616477">WhatsApp</a>
</div>

<div class="copy">
  © MS Motors Japan
</div>

</body>
</html>
