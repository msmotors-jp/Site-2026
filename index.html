<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
}

.hero img{
  width:100%;
  display:block;
}

.section{
  padding:25px 15px;
  text-align:center;
}

.section h2{
  margin-bottom:18px;
  font-size:28px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:6px;
}

iframe{
  width:100%;
  height:260px;
  border:0;
  border-radius:8px;
}

.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px 15px;
}

.box{
  border:1px solid #222;
  padding:18px 8px;
  text-align:center;
}

.box h3{
  margin-bottom:12px;
}

.btn{
  display:inline-block;
  background:#d60000;
  color:white;
  padding:12px 18px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.qr{
  width:140px;
  background:white;
  padding:5px;
}

.float{
  position:fixed;
  right:15px;
  bottom:25px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:99;
}

.float a{
  background:#00c300;
  color:white;
  padding:13px 25px;
  border-radius:40px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
}

.copy{
  text-align:center;
  color:#aaa;
  padding:18px;
  font-size:13px;
}

@media(max-width:700px){
  .gallery img{height:135px}
}
</style>
</head>

<body>

<!-- CAPA -->
<section class="hero">
  <img src="46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png" alt="MS Motors Japan">
</section>

  <div class="box">

  <div class="box">
    <h3>Instagram</h3>
