<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:'Rajdhani',sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:#000;
  border-bottom:1px solid #111;
}

.logo img{
  height:42px;
  object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(255,0,0,.4));
}

.lang button{
  background:#111;
  color:white;
  border:1px solid #444;
  padding:8px 12px;
  margin-left:6px;
  font-family:'Orbitron';
}

.hero{
  height:90vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.9)),
    url('1696FF85-FB4A-4185-BAA4-8D17C9543B96.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-family:'Orbitron';
  font-size:46px;
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 0 18px red;
  margin:0;
}

.hero p{
  font-size:22px;
  color:#ccc;
}

.btn{
  display:inline-block;
  margin-top:22px;
  padding:15px 32px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  font-family:'Orbitron';
  box-shadow:0 0 18px red;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.section h2{
  font-family:'Orbitron';
  letter-spacing:2px;
}

.car img, .main-img{
  width:90%;
  max-width:520px;
  border-radius:12px;
  box-shadow:0 0 22px rgba(255,0,0,.35);
}

.map iframe{
  width:100%;
  height:320px;
  border:0;
  border-radius:12px;
}

.float-buttons{
  position:fixed;
  right:18px;
  bottom:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.float-buttons a{
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:50px;
  font-weight:bold;
  text-align:center;
}

.line-btn{
  background:#00c300;
}

.whatsapp-btn{
  background:#25D366;
}

.footer{
  padding:30px;
  text-align:center;
  border-top:1px solid #111;
  color:#aaa;
}

a{color:white;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png" alt="MS Motors">
  </div>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('jp')">JP</button>
  </div>
</div>

<section class="hero">
  <div>
    <h1 id="title">JDM Drift Cars</h1>
    <p id="subtitle">Turbo / Manual / Export Ready</p>
    <a class="btn" href="https://wa.me/819041616477">WhatsApp</a>
  </div>
</section>

<section class="section">
  <h2 id="featured">Featured Car</h2>
  <div class="car">
    <img src="IMG_8233.jpeg" alt="Nissan Silvia S15">
    <p id="car-desc">
      Nissan Silvia S15<br>
      Drift Spec / Turbo / Manual
    </p>
  </div>
</section>

<section class="section">
  <h2 id="japan">Fuji Drift Experience</h2>
  <img class="main-img" src="679D8D64-19C8-4941-902C-5990C849228C.png" alt="Fuji Drift">
</section>

<section class="section map">
  <h2 id="location">Location</h2>

  <iframe src="https://www.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>

  <p>
    〒390-1101<br>
    長野県東筑摩郡朝日村西洗馬410-1
  </p>
</section>

<section class="section">
  <h2>Instagram</h2>
  <a href="https://instagram.com/msmotors_oficial" target="_blank">
    @msmotors_oficial
  </a>
</section>

<div class="footer">
  © MS Motors Japan
</div>

<div class="float-buttons">
  <a href="#" class="line-btn">LINE</a>
  <a href="https://wa.me/819041616477" target="_blank" class="whatsapp-btn">WhatsApp</a>
</div>

<script>
function setLang(lang){
  if(lang === 'jp'){
    document.getElementById('title').innerText = "ドリフトカー専門";
    document.getElementById('subtitle').innerText = "ターボ・マニュアル・輸出可能";
    document.getElementById('featured').innerText = "おすすめ車両";
    document.getElementById('car-desc').innerHTML = "日産シルビア S15<br>ドリフト仕様 / ターボ / MT";
    document.getElementById('japan').innerText = "富士ドリフト";
    document.getElementById('location').innerText = "所在地";
  }else{
    document.getElementById('title').innerText = "JDM Drift Cars";
    document.getElementById('subtitle').innerText = "Turbo / Manual / Export Ready";
    document.getElementById('featured').innerText = "Featured Car";
    document.getElementById('car-desc').innerHTML = "Nissan Silvia S15<br>Drift Spec / Turbo / Manual";
    document.getElementById('japan').innerText = "Fuji Drift Experience";
    document.getElementById('location').innerText = "Location";
  }
}
</script>

</body>
</html>
