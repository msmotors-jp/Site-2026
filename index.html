<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  background:url("46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png") center/cover no-repeat;
}

/* ESCURECER FUNDO */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;
  left:0;
}

/* CONTEÚDO SOBRE A IMAGEM */
.hero-content{
  position:absolute;
  top:50%;
  left:20px;
  transform:translateY(-50%);
  z-index:2;
}

/* LOGO */
.logo{
  width:180px;
  margin-bottom:20px;
}

/* TEXTO */
.title{
  font-size:40px;
  font-weight:bold;
  line-height:1.1;
}

.title span{
  color:red;
}

/* SUBTEXTO */
.subtitle{
  margin-top:10px;
  color:#ccc;
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:red;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}

/* IDIOMA */
.lang{
  position:absolute;
  top:20px;
  right:20px;
  z-index:2;
}
.lang button{
  background:transparent;
  border:1px solid #fff;
  color:#fff;
  padding:8px 12px;
  margin-left:5px;
}

/* BOTÕES FIXOS */
.float{
  position:fixed;
  right:10px;
  bottom:80px;
}
.float a{
  display:block;
  margin:10px 0;
  padding:12px 20px;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}
.line{
  background:#00c300;
  color:#fff;
}
.whatsapp{
  background:#25D366;
  color:#fff;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="lang">
    <button>EN</button>
    <button>JP</button>
  </div>

  <div class="hero-content">

    <!-- SE TIVER LOGO PNG, COLOCA AQUI -->
    <!-- <img src="logo.png" class="logo"> -->

    <div class="title">
      JDM <span>DRIFT</span><br>
      CARS
    </div>

    <div class="subtitle">
      Japan Quality.
    </div>

    <a class="btn" href="https://wa.me/819041616477">
      WhatsApp
    </a>

  </div>

</div>

<!-- BOTÕES -->
<div class="float">
  <a class="line" href="#">LINE</a>
  <a class="whatsapp" href="https://wa.me/819041616477">WhatsApp</a>
</div>

</body>
</html>
