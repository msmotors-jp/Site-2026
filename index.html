<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
}

.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero-bg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.logo{
  position:absolute;
  top:25px;
  left:25px;
  width:150px;
  height:auto;
  z-index:5;
}

.buttons{
  position:absolute;
  left:25px;
  bottom:35px;
  z-index:5;
}

.buttons a{
  display:inline-block;
  padding:12px 22px;
  margin-right:10px;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

.line{background:#00c300;}
.whatsapp{background:#25D366;}

.gallery{
  padding:45px 20px;
  text-align:center;
}

.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.slider img{
  width:250px;
  height:170px;
  object-fit:cover;
  border-radius:8px;
}

.section{
  padding:40px 20px;
  text-align:center;
}

iframe{
  width:100%;
  height:300px;
  border:0;
}

.qr img{
  width:180px;
}
</style>
</head>

<body>

<div class="hero">
  <img src="hero.jpg.PNG" class="hero-bg">
  <img src="logo.png.PNG" class="logo">

  <div class="buttons">
    <a href="#" class="line">LINE</a>
    <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
  </div>
</div>

<div class="gallery">
  <h2>Gallery</h2>
  <div class="slider">
    <img src="car1.jpg">
    <img src="car2.jpg">
    <img src="car3.jpg">
    <img src="car4.jpg">
    <img src="car5.jpg">
    <img src="car6.jpg">
    <img src="car7.jpg">
    <img src="car8.jpg">
    <img src="car9.jpg">
    <img src="car10.jpg">
  </div>
</div>

<div class="section">
  <h2>Location</h2>
  <p>〒390-1101<br>長野県東筑摩郡朝日村西洗馬410-1</p>
  <iframe src="https://maps.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>
</div>

<div class="section qr">
  <h2>LINE QR</h2>
  <img src="line-qr.png.JPG">
</div>

</body>
</html>
