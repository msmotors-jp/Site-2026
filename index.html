<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif}
a{text-decoration:none;color:#fff}

.hero{
  min-height:100vh;
  position:relative;
  background:
    linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.15)),
    url("46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png") center/cover no-repeat;
}

.logo{
  position:absolute;
  top:22px;
  left:22px;
  width:170px;
  mix-blend-mode:screen;
  filter:drop-shadow(0 2px 6px #000);
}

.lang{
  position:absolute;
  top:22px;
  right:22px;
}

.lang button{
  background:rgba(0,0,0,.55);
  color:#fff;
  border:1px solid #fff;
  padding:8px 12px;
  margin-left:6px;
  font-weight:bold;
}

.hero-text{
  position:absolute;
  left:25px;
  bottom:90px;
}

.hero-text h1{
  font-size:48px;
  line-height:1.05;
  font-weight:900;
}

.hero-text span{color:#e00000}

.hero-text p{
  margin-top:12px;
  font-size:20px;
}

.btn{
  display:inline-block;
  margin-top:18px;
  padding:13px 24px;
  border-radius:6px;
  font-weight:bold;
  text-align:center;
}

.red{background:#d90000}
.green{background:#00c300}

.section{
  padding:36px 18px;
  text-align:center;
}

.title{
  font-size:26px;
  margin-bottom:22px;
  letter-spacing:1px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.gallery img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:6px;
}

.map-box{
  margin-top:18px;
}

iframe{
  width:100%;
  height:280px;
  border:0;
  border-radius:8px;
}

.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:30px 18px;
  text-align:center;
  border-top:1px solid #222;
}

.box{
  padding:15px 8px;
}

.box h3{
  font-size:22px;
  margin-bottom:12px;
}

.qr{
  width:160px;
  max-width:100%;
  border-radius:6px;
  background:#fff;
  padding:5px;
}

.instagram-btn{
  background:#d90000;
  padding:13px 18px;
  border-radius:6px;
  display:inline-block;
  font-weight:bold;
}

.float{
  position:fixed;
  right:18px;
  bottom:25px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:99;
}

.float a{
  padding:13px 24px;
  border-radius:40px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.35);
}

.copy{
  text-align:center;
  padding:18px;
  color:#888;
  font-size:13px;
}

@media(max-width:700px){
  .hero-text h1{font-size:42px}
  .logo{width:145px}
  .links{grid-template-columns:1fr}
  .gallery img{height:155px}
}
</style>
</head>

<body>

<section class="hero">
  <img src="7EA47DE1-F50E-4A8D-B88B-34E002C5BCDF.png" class="logo">

  <div class="lang">
    <button>EN</button>
    <button>JP</button>
  </div>

  <div class="hero-text">
    <h1>JDM <span>DRIFT</span><br>CARS</h1>
    <p>Japan Quality.</p>
    <a class="btn red" href="https://wa.me/819041616477">WhatsApp</a>
  </div>
</section>

<section class="section">
  <h2 class="title">GALLERY</h2>
  <div class="gallery">
    <img src="IMG_0487.jpeg">
    <img src="IMG_1248.jpeg">
    <img src="IMG_4007.jpeg">
    <img src="IMG_6080.jpeg">
    <img src="IMG_6863.jpeg">
    <img src="IMG_6963.jpeg">
    <img src="IMG_7650.jpeg">
    <img src="IMG_8500.jpeg">
    <img src="IMG_8521.jpeg">
    <img src="IMG_9382.jpeg">
  </div>
</section>

<section class="section">
  <h2 class="title">所在地</h2>
  <p>〒390-1101<br>長野県東筑摩郡朝日村西洗馬410-1</p>

  <div class="map-box">
    <iframe src="https://maps.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>
  </div>

  <a class="btn red" href="https://maps.google.com/?q=長野県東筑摩郡朝日村西洗馬410-1" target="_blank">
    Google Mapsで見る
  </a>
</section>

<section class="links">

  <div class="box">
    <h3>Goo-net</h3>
    <a class="btn red" href="https://www.goo-net.com/php/shop/stock.php?client_id=1201441&area_id=14&baitai=goo" target="_blank">
      在庫を見る
    </a>
  </div>

  <div class="box">
    <h3>CarSensor</h3>
    <a class="btn red" href="https://www.carsensor.net/shop/nagano/329830001/?BKKN=AU6729676253&fed=othshoplinkb20190809001ns" target="_blank">
      在庫を見る
    </a>
  </div>

  <div class="box">
    <h3>LINE QR</h3>
    <img src="Image-1.jpeg" class="qr">
  </div>

  <div class="box">
    <h3>Instagram</h3>
    <a class="instagram-btn" href="https://instagram.com/msmotors_oficial" target="_blank">
      @msmotors_oficial
    </a>
  </div>

</section>

<div class="float">
  <a class="green" href="#">LINE</a>
  <a class="green" href="https://wa.me/819041616477">WhatsApp</a>
</div>

<div class="copy">© MS Motors Japan</div>

</body>
</html>
