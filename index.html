<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
}

/* HERO SLIDER */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:slide 18s infinite;
}

.hero img:nth-child(1){animation-delay:0s;}
.hero img:nth-child(2){animation-delay:6s;}
.hero img:nth-child(3){animation-delay:12s;}

@keyframes slide{
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* overlay */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* TEXTO */
.text{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  z-index:5;
}

.text h1{font-size:36px;}
.text p{font-size:18px;}

/* LOGO */
.logo{
  position:fixed;
  top:20px;
  left:20px;
  height:40px;
  z-index:10;
}

/* IDIOMA */
.lang{
  position:fixed;
  top:20px;
  right:20px;
  z-index:10;
}
.lang button{
  background:#111;
  color:white;
  border:1px solid white;
  padding:8px 12px;
}

/* BOTÕES */
.float{
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:10;
}
.float a{
  padding:12px 20px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}
.line{background:#00c300;}
.whatsapp{background:#25D366;}

/* QR */
.qr{
  display:none;
  position:fixed;
  right:20px;
  bottom:100px;
  background:#000;
  padding:10px;
  border-radius:10px;
  z-index:10;
}
.qr img{width:150px;}

/* MAP */
.map{
  padding:40px;
  text-align:center;
}
iframe{
  width:100%;
  height:300px;
  border:0;
}

/* PARTNERS */
.partners{
  text-align:center;
  padding:30px;
}
.partners a{
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<img src="logo.png.PNG" class="logo">

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('jp')">JP</button>
</div>

<section class="hero">

<img src="hero.jpg.PNG">
<img src="car1.jpg">
<img src="car2.jpg">

<div class="text">
  <h1 id="title">JDM DRIFT CARS</h1>
  <p id="subtitle">Japan Quality</p>
</div>

</section>

<div class="map">
<h2 id="location">Location</h2>
<iframe src="https://www.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>
</div>

<!-- CAR SENSOR -->
<div class="partners">
  <h2 id="partners">Partners</h2>

  <p>
    <a href="https://www.carsensor.net/shop/nagano/329830001/?BKKN=AU6729676253&fed=othshoplinkb20190809001ns" target="_blank">
      CarSensor
    </a>
  </p>
</div>

<!-- BOTÕES -->
<div class="float">
  <a href="#" class="line" onclick="toggleQR()">LINE</a>
  <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
</div>

<!-- QR -->
<div class="qr" id="qrBox">
  <img src="line-qr.png.JPG">
</div>

<script>
function toggleQR(){
  var qr = document.getElementById("qrBox");
  qr.style.display = qr.style.display === "block" ? "none" : "block";
}

function setLang(lang){
  if(lang==="jp"){
    document.getElementById("title").innerText="JDM ドリフトカー";
    document.getElementById("subtitle").innerText="日本品質";
    document.getElementById("location").innerText="所在地";
    document.getElementById("partners").innerText="提携先";
  } else {
    document.getElementById("title").innerText="JDM DRIFT CARS";
    document.getElementById("subtitle").innerText="Japan Quality";
    document.getElementById("location").innerText="Location";
    document.getElementById("partners").innerText="Partners";
  }
}
</script>

</body>
</html>
