<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0));
}

.text{
  position:absolute;
  top:30%;
  left:20px;
}

.text h1{
  font-size:45px;
  margin:0;
}

.text p{
  color:#ccc;
}

.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:140px;
}

/* BOTÕES */
.buttons{
  position:absolute;
  bottom:30px;
  left:20px;
}

.buttons a{
  padding:12px 20px;
  margin-right:10px;
  border-radius:5px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

.line{background:#00c300;}
.whatsapp{background:#25D366;}

/* FEATURES */
.features{
  display:flex;
  justify-content:space-around;
  padding:30px 10px;
  border-top:1px solid #222;
  border-bottom:1px solid #222;
  text-align:center;
}

.features div{
  font-size:13px;
}

/* GALERIA */
.gallery{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.grid img{
  width:100%;
  border-radius:6px;
}

/* MAPA */
.map{
  padding:20px;
}

iframe{
  width:100%;
  height:250px;
  border:0;
}

/* FOOTER */
.footer{
  padding:20px;
  border-top:1px solid #222;
  text-align:center;
}

.qr img{
  width:150px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg.PNG">
  <div class="overlay"></div>

  <img src="logo.png.PNG" class="logo">

  <div class="text">
    <h1>JDM DRIFT CARS</h1>
    <p>Japan Quality</p>
  </div>

  <div class="buttons">
    <a href="#qr" class="line">LINE</a>
    <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
  </div>
</div>

<!-- FEATURES -->
<div class="features">
  <div>🚗 JDM Performance</div>
  <div>⚙️ Custom Support</div>
  <div>🤝 Trusted Deals</div>
  <div>🌍 Export Ready</div>
</div>

<!-- GALERIA -->
<div class="gallery">
  <div class="grid">
    <img src="car1.jpg.JPG">
    <img src="car2.jpg.HEIC">
    <img src="car3.jpg.HEIC">
    <img src="car4.jpg.HEIC">
    <img src="car5.jpg.HEIC">
    <img src="car6.jpg.HEIC">
    <img src="car7.jpg.HEIC">
    <img src="car8.jpg.HEIC">
    <img src="car9.jpg.HEIC">
    <img src="car10.jpg.jpg">
  </div>
</div>

<!-- MAPA -->
<div class="map">
  <h3>Location</h3>
  <p>長野県東筑摩郡朝日村西洗馬410-1</p>
  <iframe src="https://maps.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>
</div>

<!-- FOOTER -->
<div class="footer">
  <div id="qr" class="qr">
    <h3>LINE QR</h3>
    <img src="line-qr.png.JPG">
  </div>
  <p>© MS Motors Japan</p>
</div>

</body>
</html>
