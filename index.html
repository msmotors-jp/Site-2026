<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;}
.hero{height:100vh;background:url('hero.jpg.PNG') center/cover no-repeat;}
.logo{position:fixed;top:20px;left:20px;height:40px;z-index:10;}

.lang{
  position:fixed;
  top:20px;
  right:20px;
  z-index:10;
}
.lang button{
  background:#111;
  color:white;
  border:1px solid white;
  padding:8px 12px;
  margin-left:5px;
}

.text{
  position:fixed;
  top:42%;
  width:100%;
  text-align:center;
  z-index:5;
}
.text h1{font-size:38px;}
.text p{font-size:18px;}

.float{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:10;}
.float a{padding:12px 20px;border-radius:30px;color:white;text-decoration:none;font-weight:bold;}
.line{background:#00c300;}
.whatsapp{background:#25D366;}

.qr{display:none;position:fixed;right:20px;bottom:100px;background:#000;padding:10px;border-radius:10px;z-index:10;}
.qr img{width:150px;}
</style>
</head>

<body>

<img src="logo.png.PNG" class="logo">

<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('jp')">JP</button>
</div>

<section class="hero"></section>

<div class="text">
  <h1 id="title">JDM DRIFT CARS</h1>
  <p id="subtitle">Turbo / Manual / Export Ready</p>
</div>

<div class="float">
  <a href="#" class="line" onclick="toggleQR()">LINE</a>
  <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
</div>

<div class="qr" id="qrBox">
  <img src="line-qr.png.JPG">
</div>

<script>
function toggleQR(){
  var qr = document.getElementById("qrBox");
  qr.style.display = qr.style.display === "block" ? "none" : "block";
}

function setLang(lang){
  if(lang === "jp"){
    document.getElementById("title").innerText = "JDM ドリフトカー";
    document.getElementById("subtitle").innerText = "ターボ / マニュアル / 輸出対応";
  } else {
    document.getElementById("title").innerText = "JDM DRIFT CARS";
    document.getElementById("subtitle").innerText = "Turbo / Manual / Export Ready";
  }
}
</script>

</body>
</html>
