<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  background:url("IMG_0487.jpeg") center/cover no-repeat;
}

/* IDIOMA */
.lang{
  position:absolute;
  top:20px;
  right:20px;
}
.lang button{
  background:transparent;
  border:1px solid #fff;
  color:#fff;
  padding:8px 12px;
  margin-left:5px;
}

/* BOTÕES FIXOS */
.float{
  position:fixed;
  right:10px;
  bottom:80px;
}
.float a{
  display:block;
  margin:10px 0;
  padding:12px 20px;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}
.line{
  background:#00c300;
  color:#fff;
}
.whatsapp{
  background:#25D366;
  color:#fff;
}

/* GALERIA */
.section{
  padding:20px;
  text-align:center;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.gallery img{
  width:100%;
  border-radius:10px;
}

/* MAPA */
iframe{
  width:100%;
  height:250px;
  border:0;
  border-radius:10px;
}

/* BOXES */
.footer{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}
.box{
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.box img{
  width:100px;
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:red;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}

/* COPYRIGHT */
.copy{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="lang">
    <button>EN</button>
    <button>JP</button>
  </div>
</div>

<!-- BOTÕES FIXOS -->
<div class="float">
  <a class="line" href="#">LINE</a>
  <a class="whatsapp" href="https://wa.me/819041616477">WhatsApp</a>
</div>

<!-- GALERIA -->
<div class="section">
  <h2>GALLERY</h2>

  <div class="gallery">
    <img src="IMG_0487.jpeg">
    <img src="IMG_1248.jpeg">
    <img src="IMG_4007.jpeg">
    <img src="IMG_6080.jpeg">
    <img src="IMG_6863.jpeg">
    <img src="IMG_6963.jpeg">
    <img src="IMG_7650.jpeg">
    <img src="IMG_8500.jpeg">
    <img src="IMG_8521.jpeg">
    <img src="IMG_9382.jpeg">
  </div>

</div>

<!-- MAPA -->
<div class="section">
  <iframe src="https://maps.google.com/maps?q=長野県東筑摩郡朝日村西洗馬410-1&output=embed"></iframe>

  <p>
  〒390-1101<br>
  長野県東筑摩郡朝日村西洗馬410-1
  </p>

  <a class="btn">Google Maps</a>
</div>

<!-- FOOTER -->
<div class="footer">

  <div class="box">
    <h3>Goo-net</h3>
    <a class="btn">在庫を見る</a>
  </div>

  <div class="box">
    <h3>CarSensor</h3>
    <a class="btn">在庫を見る</a>
  </div>

  <div class="box">
    <h3>LINE QR</h3>
    <img src="IMG_1.jpeg">
  </div>

  <div class="box">
    <h3>Instagram</h3>
    <a class="btn">@msmotors_oficial</a>
  </div>

</div>

<div class="copy">© MS Motors Japan</div>

</body>
</html>
