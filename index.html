<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif}
a{text-decoration:none;color:#fff}

.hero{
  height:100vh;
  position:relative;
  background:
    linear-gradient(to right,rgba(0,0,0,.55),rgba(0,0,0,.15)),
    url("46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png") center/cover no-repeat;
}

.logo{
  position:absolute;
  top:25px;
  left:25px;
  width:150px;
  height:auto;
  filter:drop-shadow(0 2px 6px #000);
}

.lang{
  position:absolute;
  top:25px;
  right:25px;
}
.lang button{
  background:rgba(0,0,0,.7);
  color:#fff;
  border:1px solid #fff;
  padding:8px 12px;
  margin-left:6px;
}

.hero-text{
  position:absolute;
  left:28px;
  bottom:110px;
}
.hero-text h1{
  font-size:46px;
  line-height:1.05;
  font-weight:900;
}
.hero-text span{color:#e60000}
.hero-text p{font-size:22px;margin-top:15px}

.btn{
  display:inline-block;
  padding:14px 22px;
  border-radius:6px;
  font-weight:bold;
  margin-top:20px;
}
.red{background:#d9251d}
.green{background:#32c84b}

.features{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #222;
  border-bottom:1px solid #222;
}
.feature{
  text-align:center;
  padding:24px 8px;
  border-right:1px solid #222;
}
.feature h3{color:#d9251d;margin-bottom:8px}

.section{
  padding:35px 18px;
  text-align:center;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.gallery img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:6px;
}

iframe{
  width:100%;
  height:280px;
  border:0;
  border-radius:8px;
}

.footer{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:30px 18px;
  border-top:1px solid #222;
}
.box{text-align:center}
.qr{width:130px}

.float{
  position:fixed;
  right:18px;
  bottom:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:99;
}
.float a{
  padding:13px 22px;
  border-radius:40px;
  font-weight:bold;
  text-align:center;
}

.copy{
  text-align:center;
  padding:18px;
  color:#888;
  font-size:13px;
}

@media(max-width:700px){
  .hero-text h1{font-size:42px}
  .features{grid-template-columns:repeat(2,1fr)}
  .footer{grid-template-columns:1fr}
}
</style>
</head>
