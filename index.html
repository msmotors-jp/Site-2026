<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
}

/* HERO */
.hero{
  height:100vh;
  background:url('hero.jpg.PNG') center/cover no-repeat;
}

/* LOGO */
.logo{
  position:fixed;
  top:20px;
  left:20px;
  height:40px;
}

/* BOTÕES */
.float{
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.float a{
  padding:12px 20px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.line{background:#00c300;}
.whatsapp{background:#25D366;}

/* QR */
.qr{
  display:none;
  position:fixed;
  right:20px;
  bottom:100px;
  background:#000;
  padding:10px;
  border-radius:10px;
}

.qr img{
  width:150px;
}
</style>
</head>

<body>

<!-- LOGO -->
<img src="logo.png.PNG" class="logo">

<!-- HERO -->
<section class="hero"></section>

<!-- BOTÕES -->
<div class="float">
  <a href="#" class="line" onclick="toggleQR()">LINE</a>
  <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
</div>

<!-- QR CODE -->
<div class="qr" id="qrBox">
  <img src="line-qr.png.JPG">
</div>

<script>
function toggleQR(){
  var qr = document.getElementById("qrBox");
  qr.style.display = qr.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
