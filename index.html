<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}

.hero{
  height:100vh;
  position:relative;
  background:
    linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.2)),
    url("hero.jpg") center/cover no-repeat;
}

.logo{
  position:absolute;
  top:25px;
  left:25px;
  width:140px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}

.lang{
  position:absolute;
  top:25px;
  right:25px;
}

.lang button{
  background:#111;
  color:#fff;
  border:1px solid #777;
  padding:8px 12px;
  margin-left:6px;
}

.hero-text{
  position:absolute;
  left:30px;
  bottom:90px;
}

.hero-text h1{
  font-size:48px;
  font-weight:900;
}

.hero-text span{
  color:#ff2a2a;
}

.hero-text p{
  margin-top:10px;
  color:#ccc;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  border-radius:6px;
  font-weight:bold;
}

.red{background:#e00000;color:#fff}
.green{background:#00c300;color:#fff}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:6px;
}

/* MAPA */
.map{
  padding:20px;
}

/* CAR SENSOR */
.center{
  text-align:center;
  padding:30px;
}

.center a{
  display:inline-block;
  background:#ff3c00;
  padding:14px 20px;
  border-radius:6px;
  color:#fff;
  margin-top:10px;
}

/* QR */
.qr{
  width:160px;
  margin:20px auto;
  display:block;
}

/* CONTATO */
.contact{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  padding:20px;
}

.instagram{
  background:#e00000;
  padding:12px 20px;
  border-radius:6px;
}

/* RODAPÉ */
footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<img src="logo.png" class="logo">

<div class="lang">
  <button>EN</button>
  <button>JP</button>
</div>

<div class="hero-text">
  <h1>JDM <span>DRIFT</span><br>CARS</h1>
  <p>Japan Quality.</p>

  <a href="https://wa.me/819041616477" class="btn red">WhatsApp</a>
</div>

</section>

<!-- GALERIA -->
<section class="gallery">
<img src="car1.jpg">
<img src="car2.jpg">
<img src="car3.jpg">
<img src="car4.jpg">
<img src="car5.jpg">
<img src="car6.jpg">
<img src="car7.jpg">
<img src="car8.jpg">
<img src="car9.jpg">
<img src="car10.jpg">
</section>

<!-- LOCAL -->
<section class="map">
<h2>所在地</h2>
<p>〒390-1101<br>長野県東筑摩郡朝日村西洗馬410-1</p>
<br>
<a href="https://maps.google.com" target="_blank" class="btn red">Google Mapsで見る</a>
</section>

<!-- GOO NET -->
<section class="center">
<h2>在庫を見る</h2>
<p>最新の在庫はGoo-netで確認できます</p>

<a href="https://www.goo-net.com/php/shop/stock.php?client_id=1201441&area_id=14&baitai=goo" target="_blank">
Goo-netで在庫を見る
</a>
</section>

<!-- CAR SENSOR -->
<section class="center">
<h2>CarSensor</h2>

<a href="#">
在庫を見る
</a>
</section>

<!-- LINE QR -->
<section class="center">
<h2>LINE QRコード</h2>

<img src="line-qr.jpg" class="qr">
</section>

<!-- CONTATO -->
<section class="contact">
<h2>Instagram</h2>

<a href="https://instagram.com/msmotors_oficial" class="instagram">
@msmotors_oficial
</a>

<a href="#" class="btn green">LINE</a>
<a href="https://wa.me/819041616477" class="btn green">WhatsApp</a>
</section>

<footer>
© MS Motors Japan
</footer>

</body>
</html>
