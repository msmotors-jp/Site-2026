<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
}

/* HERO */
.hero {
  position:relative;
  height:90vh;
  overflow:hidden;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.hero-text {
  position:absolute;
  top:30%;
  left:20px;
}

.hero-text h1 {
  font-size:50px;
  margin:0;
}

.hero-text span {
  color:red;
}

.btn {
  padding:12px 20px;
  border:none;
  margin-top:15px;
  font-weight:bold;
  border-radius:5px;
}

.whatsapp {
  background:red;
  color:white;
}

.line {
  background:#00c300;
  color:white;
}

/* LOGO */
.logo {
  position:absolute;
  top:10px;
  left:10px;
  width:150px;
}

/* LANGUAGE */
.lang {
  position:absolute;
  top:10px;
  right:10px;
}

.lang button {
  background:#000;
  color:#fff;
  border:1px solid #fff;
  margin:2px;
  padding:5px 10px;
}

/* FEATURES */
.features {
  display:flex;
  justify-content:space-around;
  text-align:center;
  padding:20px;
  border-top:1px solid #333;
  border-bottom:1px solid #333;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.gallery img {
  width:100%;
  border-radius:5px;
}

/* LOCATION */
.map {
  padding:20px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #333;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <img src="hero.jpg">

  <img src="logo.png" class="logo">

  <div class="lang">
    <button>EN</button>
    <button>JP</button>
  </div>

  <div class="hero-text">
    <h1>JDM <span>DRIFT</span> CARS</h1>
    <p>Japan Quality.</p>

    <button class="btn whatsapp">WhatsApp</button>
    <button class="btn line">LINE</button>
  </div>
</section>

<!-- FEATURES -->
<section class="features">
  <div>ターボ車専門</div>
  <div>整備・カスタム</div>
  <div>安心取引</div>
  <div>輸出対応</div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="car1.jpg">
  <img src="car2.jpg">
  <img src="car3.jpg">
  <img src="car4.jpg">
  <img src="car5.jpg">
  <img src="car6.jpg">
  <img src="car7.jpg">
  <img src="car8.jpg">
  <img src="car9.jpg">
  <img src="car10.jpg">
</section>

<!-- LOCATION -->
<section class="map">
  <h2>所在地</h2>
  <p>〒390-1101 長野県東筑摩郡朝日村西洗馬410-1</p>

  <iframe
    src="https://maps.google.com/maps?q=410-1%20Nishiseba&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="100%" height="250">
  </iframe>
</section>

<!-- FOOTER -->
<section class="footer">
  <img src="line-qr.png" width="120"><br><br>
  © MS Motors Japan
</section>

</body>
</html>
