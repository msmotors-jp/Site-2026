<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Motors Japan</title>

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  z-index: 999;
}

.logo {
  height: 40px;
}

.lang button {
  background: transparent;
  border: 1px solid white;
  color: white;
  margin-left: 10px;
  padding: 5px 10px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: slideShow 30s infinite;
}

.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }
.slide:nth-child(4) { animation-delay: 15s; }
.slide:nth-child(5) { animation-delay: 20s; }
.slide:nth-child(6) { animation-delay: 25s; }

@keyframes slideShow {
  0% {opacity:0;}
  10% {opacity:1;}
  20% {opacity:1;}
  30% {opacity:0;}
  100% {opacity:0;}
}

.hero-content {
  z-index: 2;
}

h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

.subtitle {
  color: gray;
  margin: 10px 0 20px;
}

.btn {
  background: red;
  padding: 15px 30px;
  color: white;
  text-decoration: none;
  display: inline-block;
}

/* FLOAT BUTTONS */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.float a {
  display: block;
  margin-top: 10px;
  padding: 12px 20px;
  border-radius: 20px;
  color: white;
  text-decoration: none;
}

.line { background: #00c300; }
.whatsapp { background: #25d366; }

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

a { color: red; }

</style>
</head>

<body>

<header>
  <img src="1696FF85-FB4A-4185-BAA4-8D17C9543B96.png" class="logo">
  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('jp')">JP</button>
  </div>
</header>

<section class="hero">

  <!-- SLIDES (suas fotos) -->
  <img src="IMG_8233.jpeg" class="slide">
  <img src="1696FF85-FB4A-4185-BAA4-8D17C9543B96.png" class="slide">
  <img src="679D8D64-19C8-4941-902C-5990C849228C.png" class="slide">

  <div class="hero-content">
    <h1 id="title">JDM DRIFT CARS</h1>
    <p class="subtitle" id="subtitle">Turbo / Manual / Export Ready</p>
    <a href="https://wa.me/819041616477" class="btn">WhatsApp</a>
  </div>

</section>

<section class="section">
  <h2 id="location">Location</h2>
  <p>
    〒390-1101<br>
    長野県東筑摩郡朝日村西洗馬410-1
  </p>

  <p>
    <a href="https://maps.google.com">Open in Google Maps</a>
  </p>
</section>

<section class="section">
  <h2>Instagram</h2>
  <a href="https://instagram.com/msmotors_oficial">
    @msmotors_oficial
  </a>
</section>

<footer class="section">
  © MS Motors Japan
</footer>

<div class="float">
  <a href="#" class="line">LINE</a>
  <a href="https://wa.me/819041616477" class="whatsapp">WhatsApp</a>
</div>

<script>
function setLang(lang){
  if(lang === 'jp'){
    document.getElementById('title').innerText = "JDM ドリフトカー";
    document.getElementById('subtitle').innerText = "ターボ / マニュアル / 輸出可能";
    document.getElementById('location').innerText = "所在地";
  } else {
    document.getElementById('title').innerText = "JDM DRIFT CARS";
    document.getElementById('subtitle').innerText = "Turbo / Manual / Export Ready";
    document.getElementById('location').innerText = "Location";
  }
}
</script>

</body>
</html>
