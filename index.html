<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

.hero {
  position: relative;
}

.hero img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 150px;
}

.buttons {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.buttons a {
  display: inline-block;
  padding: 10px 20px;
  margin: 5px;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
}

.whatsapp { background: green; }
.line { background: #00c300; }

.gallery {
  padding: 20px;
}

.gallery h2 {
  text-align: center;
}

.slider {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.slider img {
  width: 250px;
  border-radius: 10px;
}

.section {
  padding: 20px;
  text-align: center;
}

iframe {
  width: 100%;
  height: 250px;
  border: none;
}

.qr {
  text-align: center;
  padding: 20px;
}

.qr img {
  width: 200px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg.PNG">
  <img class="logo" src="logo.png.PNG">

  <div class="buttons">
    <a class="line" href="https://line.me/ti/p/09041616477">LINE</a>
    <a class="whatsapp" href="https://wa.me/819041616477">WhatsApp</a>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <h2>Gallery</h2>

  <div class="slider">
    <img src="car1.jpg">
    <img src="car2.jpg">
    <img src="car3.jpg">
    <img src="car4.jpg">
    <img src="car5.jpg">
    <img src="car6.jpg">
    <img src="car7.jpg">
    <img src="car8.jpg">
    <img src="car9.jpg">
    <img src="car10.jpg">
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <p>〒390-1101<br>長野県東筑摩郡朝日村西洗馬410-1</p>

  <iframe src="https://maps.google.com/maps?q=410-1%20Nishiseba&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<!-- QR CODE -->
<div class="qr">
  <h2>LINE QR</h2>
  <img src="line-qr.png.JPG">
</div>

</body>
</html>
