<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Motors Japan</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

header{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    z-index:10;
}

header img{
    height:40px;
}

.lang button{
    background:transparent;
    border:1px solid #fff;
    color:#fff;
    padding:5px 10px;
    margin-left:5px;
}

.hero{
    height:100vh;
    background:url('hero.jpg') center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:60px;
}

.btn{
    background:red;
    padding:15px 30px;
    margin-top:20px;
    text-decoration:none;
    color:#fff;
    display:inline-block;
}

.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:20px;
}

.slider img{
    width:300px;
    border-radius:10px;
}

.section{
    padding:40px 20px;
    text-align:center;
}

iframe{
    width:100%;
    height:300px;
    border:0;
}

.footer{
    background:#111;
    padding:20px;
    text-align:center;
}

.line-qr{
    width:150px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('jp')">JP</button>
</div>
</header>

<section class="hero">
<h1 id="title">JDM DRIFT CARS</h1>
<p id="subtitle">Japan Quality</p>

<a href="https://wa.me/819041616477" class="btn">WhatsApp</a>
</section>

<section class="section">
<h2>Gallery</h2>

<div class="slider">

<img src="IMG_8233.jpeg">
<img src="file1.jpg">
<img src="file2.jpg">
<img src="file3.jpg">
<img src="file4.jpg">
<img src="file5.jpg">
<img src="file6.jpg">
<img src="file7.jpg">
<img src="file8.jpg">

</div>

</section>

<section class="section">
<h2 id="location">Location</h2>

<p>
〒390-1101<br>
長野県東筑摩郡朝日村西洗馬410-1
</p>

<iframe src="https://maps.google.com/maps?q=朝日村西洗馬410-1&output=embed"></iframe>
</section>

<section class="section">
<h2>Contact</h2>

<a href="https://line.me/ti/p/09041616477" class="btn">LINE</a>

<br><br>

<img src="line-qr.jpg" class="line-qr">

</section>

<section class="section">
<h2>CarSensor</h2>

<a href="https://www.carsensor.net/shop/nagano/329830001/?BKKN=AU6729676253" class="btn">
View Inventory
</a>
</section>

<footer class="footer">
© MS Motors Japan
</footer>

<script>
function setLang(lang){
    if(lang === 'jp'){
        document.getElementById('title').innerText = "JDM ドリフトカー";
        document.getElementById('subtitle').innerText = "日本品質";
        document.getElementById('location').innerText = "所在地";
    }else{
        document.getElementById('title').innerText = "JDM DRIFT CARS";
        document.getElementById('subtitle').innerText = "Japan Quality";
        document.getElementById('location').innerText = "Location";
    }
}
</script>

</body>
</html>
