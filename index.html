<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Motors Japan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* HERO */
.hero{
  height:100vh;
  background:
    linear-gradient(to right, rgba(0,0,0,.85), rgba(0,0,0,.2)),
    url("46BFE8F9-A211-4E9E-BA87-77DE3C198A12.png") center/cover no-repeat;
  position:relative;
}

/* LOGO */
.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:140px;
  filter: brightness(0) invert(1);
}

/* LANG */
.lang{
  position:absolute;
  top:20px;
  right:20px;
}
.lang button{
  background:#111;
  color:#fff;
  border:1px solid #777;
  padding:6px 10px;
  margin-left:5px;
}

/* TEXT */
.hero-text{
  position:absolute;
  bottom:80px;
  left:20px;
}
.hero-text h1{
  font-size:40px;
}
.hero-text span{color:red;}
.hero-text p{margin-top:10px;color:#ccc;}

.btn{
  display:inline-block;
  margin-top:15px;
  background:red;
  padding:10px 20px;
  border-radius:6px;
  color:#fff;
  text-decoration:none;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  padding:20px;
}
.gallery img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:6px;
}

/* SECTION */
.section{
  padding:30px 20px;
  text-align:center;
}

/* FOOTER */
.footer{
  display:flex;
  flex-direction:column;
  gap:25px;
  padding:30px 20px;
  text-align:center;
}

.qr{
  width:200px;
}

.btn-red{
  background:red;
  padding:10px;
  border-radius:6px;
  color:#fff;
  text-decoration:none;
}

/* FLOAT */
.float{
  position:fixed;
  right:15px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.float a{
  padding:12px 18px;
  border-radius:25px;
  color:#fff;
  text-decoration:none;
}

.green{background:#00c300;}
.whatsapp{background:#25D366;}

.copy{
  text-align:center;
  padding:15px;
  color:#888;
}
</style>
</head>

<body>
